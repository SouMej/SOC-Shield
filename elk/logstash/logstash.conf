input {
  beats {
    port => 5044
    tags => ["winlogbeat"]
  }

  tcp {
    port => 5000
    codec => json
    tags => ["tcp-input"]
  }
}

filter {
  # Parse Windows Event Logs
  if "winlogbeat" in [tags] {
    # Normalize common fields
    mutate {
      rename => {
        "[winlog][event_id]" => "event_id"
        "[winlog][computer_name]" => "hostname"
        "[winlog][channel]" => "log_channel"
        "[winlog][provider_name]" => "provider"
        "[winlog][task]" => "task_category"
      }
    }

    # Extract user information
    if [winlog][event_data][TargetUserName] {
      mutate {
        add_field => { "target_user" => "%{[winlog][event_data][TargetUserName]}" }
      }
    }

    if [winlog][event_data][SubjectUserName] {
      mutate {
        add_field => { "subject_user" => "%{[winlog][event_data][SubjectUserName]}" }
      }
    }

    # Extract source IP for logon events
    if [winlog][event_data][IpAddress] {
      mutate {
        add_field => { "source_ip" => "%{[winlog][event_data][IpAddress]}" }
      }
    }

    # Classify event severity based on event ID
    if [event_id] == 4625 {
      mutate { add_field => { "event_category" => "authentication_failure" } }
    } else if [event_id] == 4624 {
      mutate { add_field => { "event_category" => "authentication_success" } }
    } else if [event_id] == 4672 {
      mutate { add_field => { "event_category" => "privilege_escalation" } }
    } else if [event_id] == 4688 {
      mutate { add_field => { "event_category" => "process_creation" } }
    } else if [event_id] == 4720 {
      mutate { add_field => { "event_category" => "account_management" } }
    } else if [event_id] == 4768 or [event_id] == 4769 {
      mutate { add_field => { "event_category" => "kerberos_activity" } }
    } else if [event_id] == 7045 {
      mutate { add_field => { "event_category" => "service_creation" } }
    } else if [event_id] == 1 {
      mutate { add_field => { "event_category" => "sysmon_process_create" } }
    } else if [event_id] == 3 {
      mutate { add_field => { "event_category" => "sysmon_network_connect" } }
    } else {
      mutate { add_field => { "event_category" => "other" } }
    }

    # Add timestamp processing
    date {
      match => [ "[winlog][event_data][TimeCreated]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Add ingestion timestamp
  ruby {
    code => "event.set('ingested_at', Time.now.utc.iso8601(3))"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "soc-events-%{+YYYY.MM.dd}"
    action => "index"
  }

  kafka {
    bootstrap_servers => "soc-kafka:9092"
    topic_id => "soc-logs"
    codec => json
  }

  # Debug output
  stdout {
    codec => dots
  }
}
